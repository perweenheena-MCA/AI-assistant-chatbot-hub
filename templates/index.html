<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AI Chatbot</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <div class="app">
    <aside class="sidebar" id="sidebar">
      <div class="brand">
        <div class="logo">🤖</div>
        <div class="brand-text">
          <div class="brand-name">HackAI</div>
          <div class="brand-sub">Open Source Chatbot</div>
        </div>
      </div>

      <nav class="nav">
        <button class="nav-btn active" data-action="new">New chat</button>
        <button class="nav-btn" data-action="toggleTheme" id="themeToggle">Toggle theme</button>
      </nav>

      <div class="section">
        <div class="section-title">Quick suggestions</div>
        <div class="suggestions" id="suggestions"></div>
      </div>

      <div class="footer">
        <div class="tiny">Built with Flask • Beginner-friendly • Hackathon-ready</div>
        <div class="tiny">Tip: try “Convert 100 USD to INR”</div>
      </div>
    </aside>

    <main class="main">
      <header class="topbar">
        <button class="menu-btn" id="menuBtn" aria-label="Open menu">☰</button>
        <div class="topbar-title">AI Assistant</div>
        <div class="topbar-actions">
          <div class="status-dot" title="Server status" id="healthDot"></div>
        </div>
      </header>

      <section class="chat" aria-live="polite">
        <div class="chat-area" id="chatArea"></div>

        <div class="typing" id="typing" hidden>
          <div class="typing-avatar">🤖</div>
          <div class="dots">
            <span></span><span></span><span></span>
          </div>
          <div class="typing-text">Thinking…</div>
        </div>

        <form class="composer" id="composer">
          <textarea
            id="messageInput"
            rows="1"
            placeholder="Ask anything… (Enter to send)"
            autocomplete="off"
          ></textarea>

          <div class="composer-right">
            <button class="icon-btn" id="emojiBtn" type="button" aria-label="Emoji">😊</button>
            <button class="icon-btn" id="exportBtn" type="button" aria-label="Export chat">⤓</button>
            <button class="send-btn" type="submit">Send</button>
          </div>
        </form>
      </section>
    </main>
  </div>

  <div class="emoji-pop" id="emojiPop" hidden>
    <button type="button">😊</button>
    <button type="button">😂</button>
    <button type="button">✨</button>
    <button type="button">🔥</button>
    <button type="button">💡</button>
    <button type="button">🚀</button>
  </div>

  <script src="/static/script.js"></script>
</body>
</html>
